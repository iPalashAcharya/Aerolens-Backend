name: CI/CD — Prod

on:
  push:
    branches:
      - main
    tags:
      - "release/*"

permissions:
  contents: read
  id-token: write
  packages: write
  actions: read

concurrency:
  group: aerolens-prod-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-Prod-Role
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image (prod)
        run: |
          ECR_REG="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          IMAGE="${ECR_REG}/aerolens-portal-backend:${{ github.sha }}"



          docker build -t "$IMAGE" .
          docker push "$IMAGE"
        env:
          DOCKER_BUILDKIT: 1

      - name: Deploy to prod via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Prod deploy ${{ github.sha }}" \
            --parameters commands='[
              "aws ecr get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com",
              "docker pull ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/aerolens-portal-backend:${{ github.sha }}",
              "docker tag ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/aerolens-portal-backend:${{ github.sha }} aerolens-portal-backend-prod:latest",
              "docker rm -f aerolens-portal-backend-prod || true",
              "SECRET_NAME=/myapp/prod/env AWS_REGION=${{ vars.AWS_REGION }} docker-compose -f ${{ vars.PROD_COMPOSE_FILE }} up -d --remove-orphans --force-recreate backend"
            ]' \
            --region ${{ vars.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.INSTANCE_ID }}" \
            --region ${{ vars.AWS_REGION }} || true

          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.INSTANCE_ID }}" \
            --region ${{ vars.AWS_REGION }} \
            --query "StandardOutputContent" --output text

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.INSTANCE_ID }}" \
            --region ${{ vars.AWS_REGION }} \
            --query "StandardErrorContent" --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.INSTANCE_ID }}" \
            --region ${{ vars.AWS_REGION }} \
            --query "Status" --output text)
          echo "Final Status: $STATUS"
          [ "$STATUS" = "Success" ] || exit 1
